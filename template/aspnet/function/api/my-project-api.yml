version: 1.0
provider:
    name: openfaas
    gateway: http://127.0.0.1:8080
functions:
    my-project-api:
        lang: aspnet-multi
        handler: ..
        image: my-registry/my-project-api:latest
        build_args:
            PUBLISH_PROJECT: "api/src/function.csproj"
        run-tests: "false"
        disabled: "false"

        environment:
            ASPNETCORE_ENVIRONMENT: "Development"
            service-name: "my-project-api"

        labels:
            com.openfaas.scale.min: "1"

        limits:
            cpu: "500m"
            memory: "800Mi"
        requests:
            cpu: "100m"
            memory: "400Mi"
